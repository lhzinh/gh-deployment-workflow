name: Deploy to Github Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@v6

            - name: Upload Pages Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                path: '.' 

            - name: Deploy 🚀
              uses: actions/deploy-pages@v4